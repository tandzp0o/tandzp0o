<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="320" x2="0" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 90) rotate(90) scale(160 220)">
      <stop stop-color="#fff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 380) rotate(90) scale(120 160)">
      <stop stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="460" fill="url(#bg)"/>
  <rect width="900" height="460" fill="url(#glow1)"/>
  <rect width="900" height="460" fill="url(#glow2)"/>

  <g stroke="#fff" stroke-opacity="0.05">
    <line x1="0" y1="115" x2="900" y2="115"/>
    <line x1="0" y1="230" x2="900" y2="230"/>
    <line x1="0" y1="345" x2="900" y2="345"/>
    <line x1="225" y1="0" x2="225" y2="460"/>
    <line x1="450" y1="0" x2="450" y2="460"/>
    <line x1="675" y1="0" x2="675" y2="460"/>
  </g>

  <!-- navbar pills -->
  <rect x="32" y="28" width="148" height="40" rx="20" fill="#171717" stroke="#fff" stroke-opacity="0.08"/>
  <path d="M52 48h10v10h-10z M62 38h10v20h-10z M72 48h10v10h-10z M82 38h10v20h-10z" fill="#fff" opacity="0.9"/>
  <text x="70" y="54" fill="#fff" font-family="system-ui,sans-serif" font-size="13">tandzp0o</text>

  <rect x="290" y="30" width="320" height="36" rx="18" fill="#171717" stroke="#fff" stroke-opacity="0.08"/>
  <text x="318" y="54" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="12">about</text>
  <text x="388" y="54" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="12">experience</text>
  <text x="478" y="54" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="12">projects</text>
  <text x="558" y="54" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="12">skills</text>

  <rect x="748" y="28" width="120" height="40" rx="20" fill="#fff"/>
  <text x="772" y="54" fill="#000" font-family="system-ui,sans-serif" font-size="12">portfolio</text>

  <!-- hero headlines -->
  <text x="32" y="148" fill="#fff" font-family="system-ui,sans-serif" font-size="88" font-weight="500" letter-spacing="-4">build</text>
  <text x="620" y="228" fill="#fff" font-family="system-ui,sans-serif" font-size="88" font-weight="500" letter-spacing="-4">with</text>
  <text x="200" y="318" fill="#fff" font-family="system-ui,sans-serif" font-size="88" font-weight="500" letter-spacing="-4">purpose</text>

  <!-- description -->
  <text x="32" y="252" fill="#fff" fill-opacity="0.85" font-family="system-ui,sans-serif" font-size="13">
    <tspan x="32" dy="0">fullstack developer crafting erp/crm</tspan>
    <tspan x="32" dy="18">systems — next.js, node.js, mongodb</tspan>
  </text>

  <!-- stat top right -->
  <line x1="680" y1="98" x2="748" y2="118" stroke="#fff" stroke-opacity="0.35"/>
  <text x="762" y="118" fill="#fff" font-family="system-ui,sans-serif" font-size="38" font-weight="500" text-anchor="end">+2yr</text>
  <text x="762" y="138" fill="#fff" fill-opacity="0.65" font-family="system-ui,sans-serif" font-size="11" text-anchor="end">production experience</text>

  <!-- stat bottom left -->
  <text x="72" y="400" fill="#fff" font-family="system-ui,sans-serif" font-size="38" font-weight="500">erp</text>
  <line x1="130" y1="392" x2="198" y2="372" stroke="#fff" stroke-opacity="0.35"/>
  <text x="72" y="420" fill="#fff" fill-opacity="0.65" font-family="system-ui,sans-serif" font-size="11">crm systems shipped</text>

  <!-- stat bottom right -->
  <line x1="640" y1="408" x2="708" y2="388" stroke="#fff" stroke-opacity="0.35"/>
  <text x="828" y="408" fill="#fff" font-family="system-ui,sans-serif" font-size="38" font-weight="500" text-anchor="end">ai/ml</text>
  <text x="828" y="428" fill="#fff" fill-opacity="0.65" font-family="system-ui,sans-serif" font-size="11" text-anchor="end">master's in progress</text>

  <rect y="340" width="900" height="120" fill="url(#fade)"/>
</svg>
