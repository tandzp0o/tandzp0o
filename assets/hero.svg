<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000510"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="260" x2="0" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="glow1" cx="50%" cy="30%" r="40%">
      <stop offset="0" stop-color="#0088ff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#0088ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="380" fill="url(#bg)"/>
  <rect width="900" height="380" fill="url(#glow1)"/>

  <!-- grid -->
  <g stroke="#00b4ff" stroke-opacity="0.06">
    <line x1="0" y1="95" x2="900" y2="95"/>
    <line x1="0" y1="190" x2="900" y2="190"/>
    <line x1="0" y1="285" x2="900" y2="285"/>
    <line x1="225" y1="0" x2="225" y2="380"/>
    <line x1="450" y1="0" x2="450" y2="380"/>
    <line x1="675" y1="0" x2="675" y2="380"/>
  </g>

  <!-- center lightning -->
  <path d="M450 30 L468 30 L456 100 L480 100 L438 200 L452 130 L428 130 Z" fill="url(#bolt)" filter="url(#glow)" opacity="0.85"/>

  <!-- navbar -->
  <rect x="28" y="22" width="130" height="36" rx="18" fill="#0a1628" stroke="#00b4ff" stroke-opacity="0.3"/>
  <text x="52" y="46" fill="#00b4ff" font-family="ui-monospace,monospace" font-size="12">~/tandzp0o</text>

  <rect x="300" y="24" width="300" height="32" rx="16" fill="#0a1628" stroke="#00b4ff" stroke-opacity="0.2"/>
  <text x="328" y="45" fill="#7eb8d8" font-family="system-ui,sans-serif" font-size="11">about</text>
  <text x="398" y="45" fill="#7eb8d8" font-family="system-ui,sans-serif" font-size="11">experience</text>
  <text x="488" y="45" fill="#7eb8d8" font-family="system-ui,sans-serif" font-size="11">projects</text>
  <text x="558" y="45" fill="#7eb8d8" font-family="system-ui,sans-serif" font-size="11">skills</text>

  <rect x="752" y="22" width="120" height="36" rx="18" fill="#00b4ff"/>
  <text x="776" y="45" fill="#000" font-family="system-ui,sans-serif" font-size="11" font-weight="600">portfolio</text>

  <!-- headlines -->
  <text x="28" y="155" fill="#fff" font-family="system-ui,sans-serif" font-size="76" font-weight="600" letter-spacing="-3">build</text>
  <text x="580" y="220" fill="#00d4ff" font-family="system-ui,sans-serif" font-size="76" font-weight="600" letter-spacing="-3">with</text>
  <text x="180" y="300" fill="#fff" font-family="system-ui,sans-serif" font-size="76" font-weight="600" letter-spacing="-3">purpose</text>

  <text x="28" y="248" fill="#a8d4f0" font-family="system-ui,sans-serif" font-size="12">
    <tspan x="28" dy="0">next.js · node.js · mongodb · erp/crm</tspan>
    <tspan x="28" dy="16">shipping production systems from hcm city</tspan>
  </text>

  <!-- stats -->
  <line x1="670" y1="88" x2="738" y2="108" stroke="#00b4ff" stroke-opacity="0.5"/>
  <text x="752" y="108" fill="#00d4ff" font-family="system-ui,sans-serif" font-size="34" font-weight="600" text-anchor="end">+2yr</text>
  <text x="752" y="126" fill="#7eb8d8" font-family="system-ui,sans-serif" font-size="10" text-anchor="end">production experience</text>

  <text x="60" y="355" fill="#00d4ff" font-family="system-ui,sans-serif" font-size="34" font-weight="600">erp</text>
  <line x1="118" y1="347" x2="186" y2="327" stroke="#00b4ff" stroke-opacity="0.5"/>
  <text x="60" y="373" fill="#7eb8d8" font-family="system-ui,sans-serif" font-size="10">crm systems shipped</text>

  <line x1="640" y1="340" x2="708" y2="320" stroke="#00b4ff" stroke-opacity="0.5"/>
  <text x="828" y="348" fill="#00d4ff" font-family="system-ui,sans-serif" font-size="34" font-weight="600" text-anchor="end">ai/ml</text>
  <text x="828" y="366" fill="#7eb8d8" font-family="system-ui,sans-serif" font-size="10" text-anchor="end">master's in progress</text>

  <rect y="280" width="900" height="100" fill="url(#fade)"/>
</svg>
