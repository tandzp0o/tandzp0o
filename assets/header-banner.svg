<svg xmlns="http://www.w3.org/2000/svg" width="900" height="130" viewBox="0 0 900 130">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000810"/>
      <stop offset="0.5" stop-color="#001a33"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spot" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00b4ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#00b4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="130" rx="16" fill="url(#bg)" stroke="#00b4ff" stroke-opacity="0.35"/>
  <ellipse cx="450" cy="65" rx="320" ry="60" fill="url(#spot)"/>

  <!-- lightning left -->
  <path d="M48 18 L62 18 L54 52 L72 52 L44 112 L52 68 L34 68 Z" fill="url(#bolt)" filter="url(#glow)" opacity="0.9"/>
  <path d="M820 22 L834 22 L826 56 L844 56 L816 108 L824 72 L806 72 Z" fill="url(#bolt)" filter="url(#glow)" opacity="0.75"/>

  <!-- small sparks -->
  <circle cx="120" cy="40" r="2" fill="#00d4ff" opacity="0.8"/>
  <circle cx="780" cy="90" r="2" fill="#00d4ff" opacity="0.8"/>
  <circle cx="160" cy="95" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="740" cy="35" r="1.5" fill="#fff" opacity="0.6"/>

  <!-- code brackets + name -->
  <text x="450" y="58" fill="#00b4ff" font-family="ui-monospace,monospace" font-size="22" font-weight="600" text-anchor="middle" filter="url(#glow)">&lt;</text>
  <text x="478" y="58" fill="#ffffff" font-family="system-ui,sans-serif" font-size="26" font-weight="700" text-anchor="middle" letter-spacing="2">T?N</text>
  <text x="520" y="58" fill="#00b4ff" font-family="ui-monospace,monospace" font-size="22" font-weight="600" text-anchor="middle" filter="url(#glow)">/&gt;</text>

  <text x="450" y="88" fill="#a8d4f0" font-family="system-ui,sans-serif" font-size="13" letter-spacing="4" text-anchor="middle">FULLSTACK DEVELOPER</text>

  <!-- bottom accent line -->
  <rect x="200" y="108" width="500" height="2" rx="1" fill="url(#bolt)" opacity="0.7"/>
</svg>
